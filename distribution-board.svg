<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
    <rect width="1200" height="800" fill="#f7fbff"/>
    <rect x="30" y="30" width="1140" height="740" rx="30" fill="white" stroke="#b8d7ea" stroke-width="4"/>
    <text x="60" y="95" font-size="42" font-family="sans-serif" font-weight="700" fill="#0b315f">分電盤で確認するポイント</text>
    
<rect x="80" y="150" width="420" height="430" rx="24" fill="#eef6fb" stroke="#6eaad0" stroke-width="4"/>
<text x="290" y="200" text-anchor="middle" font-size="34" font-family="sans-serif" font-weight="700" fill="#0b315f">分電盤</text>
<rect x="120" y="235" width="140" height="90" rx="14" fill="#fff" stroke="#3e7aa4" stroke-width="4"/>
<text x="190" y="290" text-anchor="middle" font-size="26" font-family="sans-serif" fill="#0b315f">主幹</text>
<g fill="#fff" stroke="#3e7aa4" stroke-width="4">
<rect x="290" y="235" width="80" height="90" rx="12"/><rect x="385" y="235" width="80" height="90" rx="12"/>
<rect x="120" y="350" width="80" height="90" rx="12"/><rect x="215" y="350" width="80" height="90" rx="12"/>
<rect x="310" y="350" width="80" height="90" rx="12"/><rect x="405" y="350" width="80" height="90" rx="12"/>
</g>
<rect x="405" y="350" width="80" height="90" rx="12" fill="#e8f7ec" stroke="#4ca56a" stroke-width="5"/>
<text x="445" y="395" text-anchor="middle" font-size="20" font-family="sans-serif" fill="#2b7a46">専用</text>
<line x1="500" y1="390" x2="650" y2="260" stroke="#176fd0" stroke-width="8" marker-end="url(#a)"/>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#176fd0"/></marker></defs>
<text x="660" y="240" font-size="32" font-family="sans-serif" font-weight="700" fill="#0b315f">確認すること</text>
<text x="660" y="300" font-size="28" font-family="sans-serif" fill="#223">① 主幹容量</text>
<text x="660" y="355" font-size="28" font-family="sans-serif" fill="#223">② 空き回路</text>
<text x="660" y="410" font-size="28" font-family="sans-serif" fill="#223">③ 100V / 200V</text>
<text x="660" y="465" font-size="28" font-family="sans-serif" fill="#223">④ 専用回路か</text>
<rect x="640" y="520" width="450" height="95" rx="18" fill="#fff6da" stroke="#e7bd4d" stroke-width="3"/>
<text x="865" y="560" text-anchor="middle" font-size="24" font-family="sans-serif" fill="#694f00">空きがあっても配線条件で</text>
<text x="865" y="592" text-anchor="middle" font-size="24" font-family="sans-serif" fill="#694f00">工事が必要な場合があります</text>

    <text x="60" y="745" font-size="24" font-family="sans-serif" fill="#5a6d7d">※最終判断は現地確認・施工担当者・施工説明書で確認</text>
    </svg>